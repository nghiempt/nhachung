services:
  postgres:
    image: postgres:16-alpine
    container_name: nhachung-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nhachung
      POSTGRES_PASSWORD: nhachung_dev_2026
      POSTGRES_DB: nhachung
    ports:
      - "5433:5432"
    volumes:
      - nhachung_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nhachung -d nhachung"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nhachung_pgdata:
